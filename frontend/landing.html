<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Fish Burger Essaouira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        red: {
                            500: '#FF4500',
                            600: '#FF4500',
                            700: '#cc3700',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        
        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
    </style>
</head>
<body class="bg-blue-950 text-white min-h-screen flex items-center justify-center overflow-x-hidden overflow-y-auto selection:bg-red-500 selection:text-white">

    <!-- Background -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-950 via-slate-900 to-blue-900 animate-gradient"></div>
        <div class="absolute inset-0 bg-black/40"></div>
        <img src="img/bakgroundfishburger.png" alt="Background" class="w-full h-full object-cover opacity-30">
    </div>

    <!-- Content -->
    <div class="relative z-10 container mx-auto px-6 py-12 max-w-4xl text-center flex flex-col items-center">
        
        <!-- Logo Icon -->
        <div class="bg-red-600 text-white w-20 h-20 rounded-full flex items-center justify-center text-3xl shadow-lg shadow-red-600/40 mb-8 mx-auto">
            <i class="fa-solid fa-burger"></i>
        </div>

        <h1 class="text-5xl md:text-7xl font-bold mb-6 leading-tight serif">
            Welcome to <br />
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-400">FISHBURGER</span>
        </h1>
        
        
        <div id="main-buttons" class="flex flex-col sm:flex-row gap-6 justify-center w-full max-w-lg mx-auto transition-all duration-500">
            <button onclick="showOrderOptions(event)" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-8 py-5 rounded-full font-bold text-lg transition-all shadow-xl shadow-red-600/30 flex items-center justify-center gap-3 hover:-translate-y-1">
                Order Now <i class="fa-solid fa-arrow-right"></i>
            </button>
            
            <button onclick="showAboutOptions(event)" class="flex-1 bg-white/10 hover:bg-white/20 backdrop-blur-md text-white border border-white/30 px-8 py-5 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-3 hover:-translate-y-1">
                <i class="fa-solid fa-book-open text-red-400"></i>
                About Us
            </button>
        </div>

        <div id="order-options" class="hidden flex-col sm:flex-row gap-6 justify-center w-full max-w-lg mx-auto transition-all duration-500 opacity-0 scale-95">
            <a href="pickup.html" onclick="localStorage.setItem('seenLanding', 'true')" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-8 py-5 rounded-full font-bold text-lg transition-all shadow-xl shadow-green-600/30 flex items-center justify-center gap-3 hover:-translate-y-1">
                Pick up
            </a>
            
            <a href="order.html?location=rooftop" onclick="localStorage.setItem('seenLanding', 'true'); localStorage.setItem('selectedLocation', 'rooftop');" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-8 py-5 rounded-full font-bold text-lg transition-all shadow-xl shadow-blue-500/30 flex items-center justify-center gap-3 hover:-translate-y-1">
                Delivery
            </a>
        </div>

        <div id="about-options" class="hidden flex-col sm:flex-row gap-6 justify-center w-full max-w-lg mx-auto transition-all duration-500 opacity-0 scale-95">
            <a href="index.html#about" onclick="localStorage.setItem('seenLanding', 'true')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-8 py-5 rounded-full font-bold text-lg transition-all shadow-xl shadow-blue-600/30 flex items-center justify-center gap-3 hover:-translate-y-1">
                About Medina
            </a>
            
            <a href="index.html#about" onclick="localStorage.setItem('seenLanding', 'true')" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white px-8 py-5 rounded-full font-bold text-lg transition-all shadow-xl shadow-orange-500/30 flex items-center justify-center gap-3 hover:-translate-y-1">
                About Rooftop
            </a>
        </div>

        <script>
            function showAboutOptions(e) {
                e.preventDefault();
                const mainBtn = document.getElementById('main-buttons');
                const aboutOpt = document.getElementById('about-options');
                
                mainBtn.classList.add('hidden');
                
                aboutOpt.classList.remove('hidden');
                aboutOpt.classList.add('flex');
                
                // Small delay to allow display:flex to apply before animating opacity
                setTimeout(() => {
                    aboutOpt.classList.remove('opacity-0', 'scale-95');
                    aboutOpt.classList.add('opacity-100', 'scale-100');
                }, 50);
            }

            function showOrderOptions(e) {
                e.preventDefault();
                const mainBtn = document.getElementById('main-buttons');
                const orderOpt = document.getElementById('order-options');
                
                mainBtn.classList.add('hidden');
                
                orderOpt.classList.remove('hidden');
                orderOpt.classList.add('flex');
                
                // Small delay to allow display:flex to apply before animating opacity
                setTimeout(() => {
                    orderOpt.classList.remove('opacity-0', 'scale-95');
                    orderOpt.classList.add('opacity-100', 'scale-100');
                }, 50);
            }
        </script>

        <div class="mt-16 text-sm text-blue-200/60 tracking-widest uppercase">
            From Ocean to Table
        </div>
    </div>

    <script>
        // Set seenLanding immediately if they land here directly
        localStorage.setItem('seenLanding', 'true');
    </script>
</body>
</html>
